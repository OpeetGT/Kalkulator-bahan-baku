
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kalkulator Bahan Baku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom styles untuk transisi yang mulus */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Notifikasi Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-boxes"></i> Kalkulator Bahan Baku
            </h1>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- Tab Navigation -->
        <div class="flex space-x-2 mb-6 border-b border-gray-200">
            <button onclick="switchTab('kalkulator')" id="tab-kalkulator" class="px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none transition-colors">
                <i class="fas fa-calculator mr-2"></i>Kalkulator
            </button>
            <button onclick="switchTab('pengaturan')" id="tab-pengaturan" class="px-4 py-2 font-medium text-gray-500 hover:text-blue-600 focus:outline-none transition-colors">
                <i class="fas fa-cog mr-2"></i>Pengaturan
            </button>
        </div>

        <!-- TAB: KALKULATOR -->
        <div id="content-kalkulator" class="tab-content active">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-gray-700">Hitung Kebutuhan Produksi</h2>
                
                <form id="calc-form" class="space-y-4 md:space-y-0 md:flex md:gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Pilih Barang yang Dibuat</label>
                        <select id="calc-barang" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                            <option value="">-- Pilih Barang --</option>
                            <!-- Options akan diisi via JS -->
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-600 mb-1">Total Produksi (Kg)</label>
                        <div class="relative">
                            <input type="number" id="calc-jumlah" step="0.01" min="0.01" placeholder="Misal: 5" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none pl-4 pr-12" required>
                            <span class="absolute right-4 top-2.5 text-gray-400">Kg</span>
                        </div>
                    </div>
                    <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-check"></i> Hitung
                    </button>
                </form>

                <!-- Hasil Kalkulasi -->
                <div id="calc-result-container" class="mt-8 hidden">
                    <h3 class="text-md font-semibold text-gray-700 mb-3 border-b pb-2">Hasil Perhitungan Bahan Baku</h3>
                    <p id="calc-summary" class="text-sm text-gray-600 mb-4"></p>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                    <th class="p-3 rounded-tl-lg">Nama Bahan Baku</th>
                                    <th class="p-3 rounded-tr-lg text-right">Total Dibutuhkan (Gram)</th>
                                </tr>
                            </thead>
                            <tbody id="calc-result-body" class="divide-y divide-gray-100">
                                <!-- Hasil akan muncul di sini -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: PENGATURAN -->
        <div id="content-pengaturan" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Kolom Kiri: Form Tambah -->
                <div class="space-y-6">
                    <!-- Tambah Barang -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                        <h2 class="text-lg font-semibold mb-4 text-gray-700">1. Tambah Barang Baru</h2>
                        <form id="add-barang-form" class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Nama Barang Jadi</label>
                                <input type="text" id="input-nama-barang" placeholder="Misal: Roti Manis" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                                Simpan Barang
                            </button>
                        </form>
                    </div>

                    <!-- Tambah Bahan Baku -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                        <h2 class="text-lg font-semibold mb-4 text-gray-700">2. Tambah Resep Bahan Baku</h2>
                        <p class="text-xs text-gray-500 mb-4">*Masukkan bahan baku yang dibutuhkan untuk membuat <strong>1 Kg</strong> barang tersebut.</p>
                        <form id="add-bahan-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Pilih Barang</label>
                                <select id="select-barang-settings" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                                    <option value="">-- Buat barang terlebih dahulu --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Nama Bahan Baku</label>
                                <input type="text" id="input-nama-bahan" placeholder="Misal: Tepung Terigu" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Jumlah (Gram) per 1 Kg Barang</label>
                                <div class="relative">
                                    <input type="number" id="input-jumlah-bahan" step="0.1" min="0.1" placeholder="Misal: 500" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none pl-4 pr-16" required>
                                    <span class="absolute right-4 top-2.5 text-gray-400">Gram</span>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                                Tambah Bahan
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Kolom Kanan: Daftar Barang & Bahan -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 h-fit max-h-[80vh] overflow-y-auto">
                    <h2 class="text-lg font-semibold mb-4 text-gray-700">Daftar Barang & Resep</h2>
                    <div id="daftar-barang-container" class="space-y-4">
                        <!-- List barang akan di-render di sini oleh JS -->
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Toast Component -->
    <div id="toast">Pesan Notifikasi</div>

    <!-- JavaScript Logic -->
    <script>
        // --- State Management ---
        // Struktur data: { "ID_BARANG": { nama: "Nama Barang", bahan: [ {nama: "Tepung", qty: 500} ] } }
        let db = JSON.parse(localStorage.getItem('bahanBakuDB')) || {};

        function saveDB() {
            localStorage.setItem('bahanBakuDB', JSON.stringify(db));
            renderAll();
        }

        // --- UI Utilities ---
        function switchTab(tabName) {
            // Update Buttons
            document.getElementById('tab-kalkulator').className = 'px-4 py-2 font-medium focus:outline-none transition-colors ' + (tabName === 'kalkulator' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-blue-600 border-b-2 border-transparent');
            document.getElementById('tab-pengaturan').className = 'px-4 py-2 font-medium focus:outline-none transition-colors ' + (tabName === 'pengaturan' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-blue-600 border-b-2 border-transparent');
            
            // Update Contents
            document.getElementById('content-kalkulator').classList.remove('active');
            document.getElementById('content-pengaturan').classList.remove('active');
            document.getElementById('content-' + tabName).classList.add('active');
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- Rendering Functions ---
        function renderAll() {
            renderDropdowns();
            renderDaftarBarang();
        }

        function renderDropdowns() {
            const calcSelect = document.getElementById('calc-barang');
            const setSelect = document.getElementById('select-barang-settings');
            
            // Simpan value yang sedang dipilih (jika ada)
            const currentCalcVal = calcSelect.value;
            const currentSetVal = setSelect.value;

            let optionsHTML = '<option value="">-- Pilih Barang --</option>';
            
            for (const id in db) {
                optionsHTML += `<option value="${id}">${db[id].nama}</option>`;
            }

            if (Object.keys(db).length === 0) {
                setSelect.innerHTML = '<option value="">-- Tambah barang di atas terlebih dahulu --</option>';
            } else {
                setSelect.innerHTML = optionsHTML;
                calcSelect.innerHTML = optionsHTML;
                
                // Kembalikan value yang dipilih sebelumnya jika masih valid
                if (db[currentCalcVal]) calcSelect.value = currentCalcVal;
                if (db[currentSetVal]) setSelect.value = currentSetVal;
            }
        }

        function renderDaftarBarang() {
            const container = document.getElementById('daftar-barang-container');
            container.innerHTML = '';

            if (Object.keys(db).length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500 italic text-center py-4">Belum ada barang yang ditambahkan.</p>';
                return;
            }

            for (const id in db) {
                const barang = db[id];
                
                // Header Barang
                const card = document.createElement('div');
                card.className = 'border border-gray-200 rounded-lg overflow-hidden';
                
                let bahanHTML = '';
                if (barang.bahan.length === 0) {
                    bahanHTML = '<tr><td colspan="3" class="px-4 py-2 text-sm text-gray-500 italic text-center">Belum ada bahan baku.</td></tr>';
                } else {
                    barang.bahan.forEach((b, index) => {
                        bahanHTML += `
                            <tr class="border-t border-gray-100 hover:bg-gray-50">
                                <td class="px-4 py-2 text-sm text-gray-700">${b.nama}</td>
                                <td class="px-4 py-2 text-sm text-gray-700 font-medium">${formatNumber(b.qty)} g</td>
                                <td class="px-4 py-2 text-right">
                                    <button onclick="hapusBahan('${id}', ${index})" class="text-red-500 hover:text-red-700" title="Hapus Bahan">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }

                card.innerHTML = `
                    <div class="bg-gray-50 px-4 py-3 flex justify-between items-center border-b border-gray-200">
                        <h3 class="font-semibold text-gray-800">${barang.nama}</h3>
                        <button onclick="hapusBarang('${id}')" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition-colors">
                            Hapus Barang
                        </button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-white text-xs text-gray-500">
                            <tr>
                                <th class="px-4 py-2 font-medium">Bahan Baku (per 1 Kg)</th>
                                <th class="px-4 py-2 font-medium">Jumlah</th>
                                <th class="px-4 py-2"></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${bahanHTML}
                        </tbody>
                    </table>
                `;
                container.appendChild(card);
            }
        }

        // --- Helper Formatting ---
        function formatNumber(num) {
            // Format angka dengan pemisah ribuan agar mudah dibaca
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // --- Event Listeners & Core Logic ---
        
        // 1. Tambah Barang
        document.getElementById('add-barang-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const namaInput = document.getElementById('input-nama-barang');
            const namaBarang = namaInput.value.trim();
            
            if (namaBarang) {
                const id = 'BRG_' + Date.now();
                db[id] = { nama: namaBarang, bahan: [] };
                saveDB();
                namaInput.value = '';
                showToast(`Barang "${namaBarang}" berhasil ditambahkan.`);
            }
        });

        // 2. Tambah Bahan Baku
        document.getElementById('add-bahan-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const idBarang = document.getElementById('select-barang-settings').value;
            const namaBahan = document.getElementById('input-nama-bahan').value.trim();
            const qtyBahan = parseFloat(document.getElementById('input-jumlah-bahan').value);

            if (!idBarang) {
                showToast("Pilih barang terlebih dahulu!");
                return;
            }

            if (namaBahan && qtyBahan > 0) {
                db[idBarang].bahan.push({ nama: namaBahan, qty: qtyBahan });
                saveDB();
                
                // Reset form input bahan saja, biarkan barang terpilih
                document.getElementById('input-nama-bahan').value = '';
                document.getElementById('input-jumlah-bahan').value = '';
                showToast(`Bahan "${namaBahan}" ditambahkan ke ${db[idBarang].nama}.`);
            }
        });

        // 3. Kalkulator / Perhitungan
        document.getElementById('calc-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const idBarang = document.getElementById('calc-barang').value;
            const jumlahKg = parseFloat(document.getElementById('calc-jumlah').value);

            if (!idBarang || !db[idBarang]) {
                showToast("Pilih barang yang valid!");
                return;
            }

            const barang = db[idBarang];
            const tbody = document.getElementById('calc-result-body');
            const container = document.getElementById('calc-result-container');
            const summary = document.getElementById('calc-summary');
            
            tbody.innerHTML = ''; // bersihkan tabel
            
            if (barang.bahan.length === 0) {
                summary.innerHTML = `<span class="text-red-500">Belum ada resep bahan baku untuk <strong>${barang.nama}</strong>. Silakan tambahkan di menu Pengaturan.</span>`;
                container.classList.remove('hidden');
                return;
            }

            summary.innerHTML = `Untuk membuat <strong>${jumlahKg} Kg</strong> ${barang.nama}, Anda membutuhkan:`;

            barang.bahan.forEach(b => {
                const totalGram = b.qty * jumlahKg;
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-3 border-b border-gray-100 text-gray-700">${b.nama}</td>
                    <td class="p-3 border-b border-gray-100 text-right text-gray-800 font-semibold text-lg">${formatNumber(totalGram)} <span class="text-sm font-normal text-gray-500">g</span></td>
                `;
                tbody.appendChild(tr);
            });

            container.classList.remove('hidden');
            
            // Scroll ke hasil
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        // 4. Fitur Hapus (Global functions karena dipanggil via inline onclick)
        window.hapusBarang = function(id) {
            if(confirm(`Yakin ingin menghapus barang "${db[id].nama}" beserta semua resep bahannya?`)) {
                delete db[id];
                saveDB();
                
                // Sembunyikan kalkulator jika barang yang sedang dihitung dihapus
                const calcContainer = document.getElementById('calc-result-container');
                if(!calcContainer.classList.contains('hidden')) {
                    calcContainer.classList.add('hidden');
                }
                showToast("Barang berhasil dihapus.");
            }
        };

        window.hapusBahan = function(idBarang, indexBahan) {
            if(confirm(`Hapus bahan baku ini?`)) {
                db[idBarang].bahan.splice(indexBahan, 1);
                saveDB();
                showToast("Bahan baku dihapus.");
            }
        };

        // --- Inisialisasi Awal ---
        renderAll();

    </script>
</body>
</html>
